server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Plain-text config.yaml — must never be cached so a freshly mounted
    # file is picked up on refresh without a stale browser cache.
    location = /config.yaml {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        default_type text/yaml;
        try_files $uri =404;
    }

    # Hashed Vite assets — safe to cache aggressively.
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown routes return index.html so hash-based navigation
    # keeps working even if someone deep-links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip static text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/yaml image/svg+xml;
    gzip_min_length 512;

    # basic hardening
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options          "SAMEORIGIN"      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
}
