# ─────────────────────────────────────────────
#  reach-me-out · profile config
#  Edit this file, then `npm run build`.
#  Values are baked into the production bundle.
# ─────────────────────────────────────────────

profile:
  name: "Kartikey Choudhary"
  title: "Designer & Full-Stack Developer"
  bio: "Building beautiful things on the internet. Always open to new collaborations and exciting projects."
  avatar: ""           # path under public/ (e.g. "avatar.jpg") — leave blank for initials
  phone: "+919671416759"
  email: "kartikey31choudhary@gmail.com"
  website: "https://kartikeychoudhary.com/"
  location: "Pune, IN"

# ─── Theme ────────────────────────────────────
theme:
  mode: dark           # dark | light   (initial; user can toggle at runtime)
  background: mesh     # mesh | gradient | solid | noise
  primary: "#6366f1"   # indigo — main accent (buttons, rings, highlights)
  accent: "#a855f7"    # violet — secondary accent (gradient pair)
  radius: 16           # link button border-radius in px
  blur: true           # glassmorphism blur on cards

# ─── Links ────────────────────────────────────
# icon:  any Font Awesome 6 class string
# color: icon + button accent color (optional — falls back to primary)
# badge: short text badge on the right (optional)
# enabled: false hides the link without deleting it

